version: '3.8'

services:
  wrapper-manager-1:
    build: ./wrapper-manager
    image: karen-wrapper-manager:local
    privileged: true
    container_name: karen-wm-1
    volumes:
      - wm-data-1:/root/rootfs/data
    command: ["--host", "0.0.0.0", "--port", "8081"]
    restart: unless-stopped

  wrapper-manager-2:
    build: ./wrapper-manager
    image: karen-wrapper-manager:local
    privileged: true
    container_name: karen-wm-2
    volumes:
      - wm-data-2:/root/rootfs/data
    command: ["--host", "0.0.0.0", "--port", "8082"]
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: karen-bot
    depends_on:
      - wrapper-manager-1
      - wrapper-manager-2
    volumes:
      - ./bot/config.yaml:/app/config.yaml
      - ./bot/downloads:/downloads
      - ./bot/telegram-cache.json:/app/telegram-cache.json
    command: ["--bot"]
    restart: unless-stopped

volumes:
  wm-data-1:
  wm-data-2:
