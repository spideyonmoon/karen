# Base stack. The wrapper-manager services + their volumes are generated from
# .env into docker-compose.override.yml (gitignored) by ./generate.sh, and
# Docker Compose merges them automatically. The account count in .env decides
# how many wrappers exist — see .env.example and ./setup.sh.
services:
  bot:
    build: ./bot
    container_name: karen-bot
    volumes:
      - ./bot/config.yaml:/app/config.yaml
      - ./bot/downloads:/downloads
      - ./bot/telegram-cache.json:/app/telegram-cache.json
    command: ["--bot"]
    restart: unless-stopped
