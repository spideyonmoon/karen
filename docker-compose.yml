version: '3.8'

services:
  wrapper-manager:
    build: ./wrapper-manager
    image: karen-wrapper-manager:local
    privileged: true
    container_name: karen-wrapper-manager
    volumes:
      - wrapper-manager-data:/app/rootfs/data
    environment:
      - GRPC_ADDR=:8080
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: karen-bot
    depends_on:
      - wrapper-manager
    volumes:
      - ./bot/config.yaml:/app/config.yaml
      - ./bot/downloads:/downloads
      - ./bot/telegram-cache.json:/app/telegram-cache.json
    command: ["--bot"]
    restart: unless-stopped

volumes:
  wrapper-manager-data:
