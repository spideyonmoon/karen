# Base stack. The wrapper-manager services + their volumes are generated from
# .env into docker-compose.override.yml (gitignored) by ./generate.sh, and
# Docker Compose merges them automatically. The account count in .env decides
# how many wrappers exist — see .env.example and ./setup.sh.
services:
  bot:
    build: ./bot
    container_name: karen-bot
    volumes:
      - ./bot/config.yaml:/app/config.yaml
      - ./bot/downloads:/downloads
      # All mutable JSON state (audio cache, admin lock + user profiles, and the
      # scheduled-rip queue) lives in this ONE directory mount — NOT as per-file
      # mounts. A single-file bind mount breaks atomic saves: the code writes a
      # ".tmp" sibling then os.Rename()s it over the target, but tmp sits on the
      # container overlay fs while a single-file mount is a separate device, so the
      # rename returns EXDEV and the host file silently never updates (cache lost,
      # scheduled jobs lost across restarts). Mounting the directory puts tmp and
      # target on the same fs, so rename is atomic and actually persists.
      # generate.sh creates ./bot/state first so Docker mounts a dir, not a file.
      - ./bot/state:/app/state
      # Docker Engine socket — used ONLY by the admin /restart command to cycle the
      # wrapper-manager containers (karen-wm-*) alongside the bot. This grants the
      # bot host-root-equivalent control of Docker; acceptable here because the bot
      # is single-admin and private. Remove this line to revert /restart to bot-only.
      - /var/run/docker.sock:/var/run/docker.sock
    command: ["--bot"]
    restart: unless-stopped
    # MTProto uploads to DC5 (Singapore, ~176ms RTT) drop/resume because
    # uploadThreads=16 (~8MB in flight) saturates the single TCP send buffer,
    # starving gotd's keepalive ping write() -> i/o timeout -> engine torn down.
    # Raise the per-socket send buffer ceiling so upload data + the ping coexist.
    # tcp_wmem is net-namespaced, so it must be set on the container (a host
    # sysctl won't reach it). Reversible: delete this block and redeploy.
    # Format: "min default max" (bytes). Default max is ~4MB; 16MB clears the BDP.
    sysctls:
      - net.ipv4.tcp_wmem=4096 262144 16777216
